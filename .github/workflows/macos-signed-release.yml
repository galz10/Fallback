name: macOS Signed Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  macos-signed-release:
    runs-on: macos-14
    environment: release
    steps:
      - name: Require repository admin actor
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          permission="$(gh api "repos/${{ github.repository }}/collaborators/${{ github.actor }}/permission" --jq '.permission')"
          if [[ "$permission" != "admin" ]]; then
            echo "Only repository admins can run signed release workflows. Actor '${{ github.actor }}' has '$permission' permission." >&2
            exit 1
          fi

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm package:mac
        env:
          CSC_LINK: ${{ secrets.MACOS_DEVELOPER_ID_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      - run: pnpm package:mac:smoke -- --require-signed --require-notarized
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: fallback-macos-release-${{ github.ref_name }}
          path: |
            release/*.dmg
            release/*.blockmap
          if-no-files-found: error
