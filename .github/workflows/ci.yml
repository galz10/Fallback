name: CI

on:
  pull_request:
  merge_group:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v5
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: sudo apt-get update && sudo apt-get install -y libsecret-1-0 libsecret-1-dev pkg-config
      - run: pnpm install --frozen-lockfile
      - run: pnpm security:scan
      - run: pnpm beta:check

  macos-package-smoke:
    runs-on: macos-14
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v5
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm package:dir
      - run: pnpm package:mac:smoke
      - uses: actions/upload-artifact@v4
        with:
          name: fallback-macos-dir-${{ github.sha }}
          path: release/mac*/Fallback.app
          if-no-files-found: error
